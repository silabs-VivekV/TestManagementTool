server {
    listen 80;
    server_name sfthyd158.silabs.com 10.207.132.78;

    # Built React app (output of `npm run build`).
    root /opt/testmgmt/TestManagementTool/frontend/dist;
    index index.html;

    # Allow large Excel imports / master-list uploads.
    client_max_body_size 64M;

    # Backend API (FastAPI). The frontend calls /api/v1/... at the same origin,
    # so no CORS configuration is needed.
    location /api/ {
        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # The "Sync from TestRail" button streams live console logs (SSE/NDJSON).
        # Disable buffering and use long timeouts so progress shows in real time.
        proxy_buffering off;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }

    # Interactive API docs (optional, handy for debugging).
    location /docs        { proxy_pass http://127.0.0.1:8000; }
    location = /health    { proxy_pass http://127.0.0.1:8000; }

    # SPA fallback: let React Router handle client-side routes.
    location / {
        try_files $uri $uri/ /index.html;
    }
}
